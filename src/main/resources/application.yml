server:
  port: 8088
  servlet:
    context-path: /

spring:
  application:
    name: ai-powered-fitness-system

  # 执行 哪个配置 文件
  profiles:
    active: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fitness_ai_db}
    username: ${DB_USERNAME:fitness_user}
    password: ${DB_PASSWORD:myPostgresPass123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
    out-of-order: false
    validate-on-migrate: false
    encoding: UTF-8


  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:sk-7e9cad7dd0c240f19556d7bbf7b2acab}
      chat:
        enabled: true
        options:
          model: ${AI_DASHSCOPE_MODEL:tongyi-xiaomi-analysis-flash}
          temperature: 0.7
          top-p: 0.8
          max-tokens: 5000
      # 网络超时配置（防止Connection reset）
      timeout: 120000  # 总超时时间120秒（单位：毫秒）
      connect-timeout: 30000  # 连接超时30秒（单位：毫秒）
      read-timeout: 90000     # 读取超时90秒（单位：毫秒）
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:embeddinggemma:300m}

knowledge:
  chunk:
    size: 500
    overlap: 50

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.fitness.modules.*.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    default-executor-type: simple
    default-statement-timeout: 25000
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters-long} # JWT 密钥；可环境变量配置；默认
  expiration: ${JWT_EXPIRATION:259200000}  # 登录状态保留时间：3天 = 3 * 24 * 60 * 60 * 1000 = 259200000 毫秒
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # JWT 刷新令牌过期时间；可环境变量配置；默认 7 天
  issuer: ai-fitness-system
  audience: fitness-users

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioPass123}
  bucket-name: ${MINIO_BUCKET:fitness-bucket}
  secure: ${MINIO_SECURE:false}

aliyun:
  # 阿里云短信服务
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
    sign-name: 速通互联验证码
    template-code: 100001
    endpoint: dypnsapi.aliyuncs.com

logging:
  level:
    com.fitness: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
