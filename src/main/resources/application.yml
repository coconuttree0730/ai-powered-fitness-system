server:
  port: ${SERVER_PORT}
  servlet:
    context-path: /

spring:
  application:
    name: ai-powered-fitness-system

  profiles:
    active: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
    out-of-order: false
    validate-on-migrate: false
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        enabled: true
        options:
          model: ${AI_DASHSCOPE_MODEL}
          temperature: 0.7
          top-p: 0.8
          max-tokens: 5000
      timeout: 120000
      connect-timeout: 30000
      read-timeout: 90000
    ollama:
      base-url: ${OLLAMA_BASE_URL}
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL}

knowledge:
  chunk:
    size: 500
    overlap: 50

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.fitness.modules.*.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    default-executor-type: simple
    default-statement-timeout: 25000
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}
  issuer: ai-fitness-system # 签发者
  audience: fitness-users # 验证用户

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET}
  secure: ${MINIO_SECURE}

aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
    sign-name: 速通互联验证码
    template-code: 100001
    endpoint: dypnsapi.aliyuncs.com

alipay:
  app-id: ${ALIPAY_APP_ID}
  private-key: ${ALIPAY_PRIVATE_KEY}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY}
  server-url: ${ALIPAY_SERVER_URL}
  notify-url: ${ALIPAY_NOTIFY_URL}
  return-url: ${ALIPAY_RETURN_URL}

logging:
  level:
    com.fitness: INFO
    org.springframework.security: INFO
    com.alibaba.cloud.ai.graph: WARN
    com.alibaba.cloud.ai.graph.utils: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
