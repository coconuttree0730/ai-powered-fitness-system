server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: ai-powered-fitness-system

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fitness_ai_db}
    username: ${DB_USERNAME:fitness_user}
    password: ${DB_PASSWORD:myPostgresPass123}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
      pool-name: FitnessHikariPool
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION:60000}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
    out-of-order: false
    validate-on-migrate: false
    encoding: UTF-8

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:myRedisPass123}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000ms}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:2}
          max-wait: ${REDIS_POOL_MAX_WAIT:-1ms}

  rabbitmq:
    host: ${RABBITMQ_HOST:172.19.55.232}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:fitness_rabbit}
    password: ${RABBITMQ_PASSWORD:myRabbitPass123}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-name: fitness-system
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
          multiplier: 2.0
          max-interval: 10000ms

  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:100MB}

  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        enabled: ${AI_DASHSCOPE_CHAT_ENABLED:true}
        options:
          model: ${AI_DASHSCOPE_MODEL:kimi-k2.6}
          temperature: ${AI_DASHSCOPE_TEMPERATURE:0.7}
          top-p: ${AI_DASHSCOPE_TOP_P:0.8}
          max-tokens: ${AI_DASHSCOPE_MAX_TOKENS:5000}
      timeout: ${AI_DASHSCOPE_TIMEOUT:120000}
      connect-timeout: ${AI_DASHSCOPE_CONNECT_TIMEOUT:30000}
      read-timeout: ${AI_DASHSCOPE_READ_TIMEOUT:90000}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:embeddinggemma:300m}

knowledge:
  chunk:
    size: ${KNOWLEDGE_CHUNK_SIZE:500}
    overlap: ${KNOWLEDGE_CHUNK_OVERLAP:50}
  rag:
    query-rewrite:
      enabled: ${KNOWLEDGE_RAG_QUERY_REWRITE_ENABLED:false}
      provider: ${KNOWLEDGE_RAG_QUERY_REWRITE_PROVIDER:noop}
      max-queries: ${KNOWLEDGE_RAG_QUERY_REWRITE_MAX_QUERIES:3}
    reranker:
      enabled: ${KNOWLEDGE_RAG_RERANKER_ENABLED:false}
      provider: ${KNOWLEDGE_RAG_RERANKER_PROVIDER:noop}
      endpoint: ${KNOWLEDGE_RAG_RERANKER_ENDPOINT:http://localhost:8081/rerank}
      top-n: ${KNOWLEDGE_RAG_RERANKER_TOP_N:20}
      timeout-ms: ${KNOWLEDGE_RAG_RERANKER_TIMEOUT_MS:3000}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.fitness.modules.*.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: false
    aggressive-lazy-loading: false
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    default-executor-type: reuse
    default-statement-timeout: ${MYBATIS_STATEMENT_TIMEOUT:25000}
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-with-at-least-64-characters-long-for-hs512-algorithm}
  access-expiration: ${JWT_ACCESS_EXPIRATION:1800000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  remember-me-expiration: ${JWT_REMEMBER_ME_EXPIRATION:2592000000}
  issuer: ${JWT_ISSUER:ai-fitness-system}
  audience: ${JWT_AUDIENCE:fitness-users}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioPass123}
  bucket-name: ${MINIO_BUCKET:fitness-bucket}
  secure: ${MINIO_SECURE:false}

aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:速通互联验证码}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:100001}
    endpoint: ${ALIYUN_SMS_ENDPOINT:dypnsapi.aliyuncs.com}

alipay:
  app-id: ${ALIPAY_APP_ID}
  private-key: ${ALIPAY_PRIVATE_KEY}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY}
  server-url: ${ALIPAY_SERVER_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  notify-url: ${ALIPAY_NOTIFY_URL:http://localhost:8080/api/v1/payment/alipay/notify}
  return-url: ${ALIPAY_RETURN_URL:http://localhost:3000/member/coach}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc:
  api-docs:
    version: openapi_3_0

logging:
  level:
    com.fitness: INFO
    org.springframework.security: INFO
    com.alibaba.cloud.ai.graph: WARN
    com.alibaba.cloud.ai.graph.utils: WARN
