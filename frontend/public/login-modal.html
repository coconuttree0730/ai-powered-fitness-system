<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智健AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-light: #FF8C61;
            --primary-dark: #E55A2B;
            --primary-gradient: linear-gradient(135deg, #FF6B35 0%, #FF8C61 100%);
            --primary-glow: rgba(255, 107, 53, 0.4);
            --accent-gold: #FFD93D;
            --accent-teal: #2EC4B6;
            --accent-purple: #A855F7;
            --accent-blue: #3B82F6;
            --accent-rose: #F43F5E;
            --bg-dark: #0A0A0F;
            --bg-dark-secondary: #12121A;
            --bg-dark-tertiary: #1A1A25;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --bg-light: #FAFBFC;
            --bg-white: #FFFFFF;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --text-muted: rgba(255, 255, 255, 0.5);
            --text-dark: #1A1A2E;
            --text-gray: #6B7280;
            --error: #EF4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --success: #10B981;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.4);
            --shadow-primary: 0 8px 30px rgba(255, 107, 53, 0.35);
            --shadow-glow: 0 0 60px rgba(255, 107, 53, 0.25);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Login Modal Container */
        .login-modal {
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
            background: var(--bg-dark-secondary);
            border-radius: var(--radius-xl);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            box-shadow: var(--shadow-lg), 0 0 100px rgba(255, 107, 53, 0.15);
            transform: scale(0.9) translateY(30px);
            opacity: 0;
            transition: all var(--transition-slow);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .modal-overlay.active .login-modal {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* Left Panel - Visual */
        .login-visual {
            position: relative;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.2) 0%, rgba(168, 85, 247, 0.15) 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        .login-visual::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 53, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.3) 0%, transparent 50%);
            z-index: 0;
        }

        .login-visual-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800&h=1200&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: 1;
        }

        .login-visual-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.3) 0%, rgba(10, 10, 15, 0.85) 100%);
            z-index: 2;
        }

        .login-visual-content {
            position: relative;
            z-index: 3;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 60px;
        }

        .login-logo-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-gradient);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-primary);
        }

        .login-logo-text {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-primary);
        }

        .login-logo-text span {
            color: var(--primary);
        }

        .login-tagline {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        .login-tagline span {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-description {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 280px;
        }

        .login-features {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .login-feature-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 107, 53, 0.2);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* Right Panel - Form */
        .login-form-panel {
            padding: 48px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .login-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-normal);
            color: var(--text-muted);
            font-size: 20px;
        }

        .login-close:hover {
            background: rgba(255, 107, 53, 0.1);
            border-color: rgba(255, 107, 53, 0.3);
            color: var(--primary);
            transform: rotate(90deg);
        }

        .login-header {
            margin-bottom: 32px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        .login-subtitle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        .login-subtitle a:hover {
            text-decoration: underline;
        }

        /* Login Tabs */
        .login-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            background: var(--bg-card);
            padding: 6px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .login-tab {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-normal);
            font-family: inherit;
        }

        .login-tab:hover {
            color: var(--text-secondary);
        }

        .login-tab.active {
            background: var(--primary-gradient);
            color: var(--text-primary);
            box-shadow: var(--shadow-primary);
        }

        /* Form Styles */
        .login-form {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .login-form.active {
            display: flex;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            padding-left: 48px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            font-size: 15px;
            color: var(--text-primary);
            font-family: inherit;
            transition: all var(--transition-normal);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: var(--bg-card-hover);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-card-hover);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
        }

        .form-input.error {
            border-color: var(--error);
            background: var(--error-bg);
        }

        .form-input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-muted);
            transition: all var(--transition-normal);
        }

        .form-input:focus + .form-input-icon,
        .form-input:not(:placeholder-shown) + .form-input-icon {
            color: var(--primary);
        }

        .form-input.error + .form-input-icon {
            color: var(--error);
        }

        .form-input-suffix {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
        }

        .password-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            transition: all var(--transition-fast);
            padding: 4px;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .captcha-btn {
            padding: 8px 16px;
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-normal);
            font-family: inherit;
            white-space: nowrap;
        }

        .captcha-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-primary);
        }

        .captcha-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .forgot-password {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .error-message {
            font-size: 12px;
            color: var(--error);
            display: none;
            align-items: center;
            gap: 4px;
        }

        .error-message.show {
            display: flex;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px 24px;
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-normal);
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-primary);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .submit-btn.loading {
            color: transparent;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--text-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Social Login */
        .social-login {
            margin-top: 32px;
            text-align: center;
        }

        .social-login-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .social-login-divider::before,
        .social-login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .social-login-divider span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .social-login-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .social-btn {
            width: 56px;
            height: 56px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-normal);
            font-size: 24px;
        }

        .social-btn:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
        }

        .social-btn.wechat:hover {
            border-color: #07C160;
            background: rgba(7, 193, 96, 0.1);
        }

        .social-btn.alipay:hover {
            border-color: #1677FF;
            background: rgba(22, 119, 255, 0.1);
        }

        /* Agreement */
        .login-agreement {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .login-agreement a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .login-agreement a:hover {
            text-decoration: underline;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 16px 24px;
            background: var(--bg-dark-tertiary);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 10001;
            opacity: 0;
            transition: all var(--transition-normal);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--error);
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .toast.success .toast-icon {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .toast.error .toast-icon {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        .toast-message {
            font-size: 14px;
            font-weight: 500;
        }

        /* Demo Button */
        .demo-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 28px;
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-normal);
            font-family: inherit;
            box-shadow: var(--shadow-primary);
            z-index: 100;
        }

        .demo-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.45);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .modal-overlay {
                padding: 0;
                align-items: flex-end;
            }

            .login-modal {
                grid-template-columns: 1fr;
                max-width: 100%;
                min-height: auto;
                max-height: 90vh;
                overflow-y: auto;
                border-radius: var(--radius-xl) var(--radius-xl) 0 0;
                transform: translateY(100%);
            }

            .modal-overlay.active .login-modal {
                transform: translateY(0);
            }

            .login-visual {
                display: none;
            }

            .login-form-panel {
                padding: 32px 24px;
            }

            .login-close {
                top: 16px;
                right: 16px;
            }

            .login-title {
                font-size: 24px;
            }

            .login-tabs {
                padding: 4px;
            }

            .login-tab {
                padding: 10px 16px;
                font-size: 13px;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .animate-fadeInUp {
            animation: fadeInUp 0.5s ease forwards;
        }

        .animate-delay-1 { animation-delay: 0.1s; }
        .animate-delay-2 { animation-delay: 0.2s; }
        .animate-delay-3 { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <!-- Demo Button -->
    <button class="demo-btn" onclick="openLoginModal()">打开登录弹窗</button>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModalOverlay" onclick="closeLoginModalOnOverlay(event)">
        <div class="login-modal" onclick="event.stopPropagation()">
            <!-- Left Panel - Visual -->
            <div class="login-visual">
                <div class="login-visual-bg"></div>
                <div class="login-visual-overlay"></div>
                
                <div class="login-visual-content">
                    <div class="login-logo">
                        <div class="login-logo-icon">💪</div>
                        <div class="login-logo-text">智健<span>AI</span></div>
                    </div>
                    <h2 class="login-tagline">开启您的<br><span>智能健身之旅</span></h2>
                    <p class="login-description">运用先进AI技术，为您量身定制科学训练计划，让每一次锻炼都精准高效。</p>
                </div>

                <div class="login-features">
                    <div class="login-feature-item">
                        <div class="login-feature-icon">🎯</div>
                        <span>AI智能训练计划</span>
                    </div>
                    <div class="login-feature-item">
                        <div class="login-feature-icon">📊</div>
                        <span>实时数据追踪</span>
                    </div>
                    <div class="login-feature-item">
                        <div class="login-feature-icon">👥</div>
                        <span>专业教练团队</span>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Form -->
            <div class="login-form-panel">
                <button class="login-close" onclick="closeLoginModal()" title="关闭">×</button>

                <div class="login-header">
                    <h1 class="login-title">欢迎回来</h1>
                    <p class="login-subtitle">还没有账号？<a href="#" onclick="showRegister()">立即注册</a></p>
                </div>

                <!-- Login Tabs -->
                <div class="login-tabs">
                    <button class="login-tab active" data-tab="password" onclick="switchTab('password')">密码登录</button>
                    <button class="login-tab" data-tab="sms" onclick="switchTab('sms')">短信登录</button>
                </div>

                <!-- Password Login Form -->
                <form class="login-form active" id="passwordForm" onsubmit="handlePasswordLogin(event)">
                    <div class="form-group">
                        <label class="form-label">手机号/邮箱</label>
                        <div class="form-input-wrapper">
                            <input type="text" class="form-input" id="passwordAccount" placeholder="请输入手机号或邮箱" required>
                            <span class="form-input-icon">📱</span>
                        </div>
                        <span class="error-message" id="passwordAccountError">
                            <span>⚠️</span> 请输入有效的手机号或邮箱
                        </span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="form-input-wrapper">
                            <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                            <span class="form-input-icon">🔒</span>
                            <div class="form-input-suffix">
                                <button type="button" class="password-toggle" onclick="togglePassword('password', this)">👁️</button>
                            </div>
                        </div>
                        <span class="error-message" id="passwordError">
                            <span>⚠️</span> 密码不能为空
                        </span>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-password" onclick="showForgotPassword()">忘记密码？</a>
                    </div>

                    <button type="submit" class="submit-btn" id="passwordSubmitBtn">
                        <span>登录</span>
                    </button>
                </form>

                <!-- SMS Login Form -->
                <form class="login-form" id="smsForm" onsubmit="handleSMSLogin(event)">
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <div class="form-input-wrapper">
                            <input type="tel" class="form-input" id="smsPhone" placeholder="请输入手机号" maxlength="11" required>
                            <span class="form-input-icon">📱</span>
                        </div>
                        <span class="error-message" id="smsPhoneError">
                            <span>⚠️</span> 请输入有效的11位手机号
                        </span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="form-input-wrapper">
                            <input type="text" class="form-input" id="smsCode" placeholder="请输入验证码" maxlength="6" style="padding-right: 120px;" required>
                            <span class="form-input-icon">🔢</span>
                            <div class="form-input-suffix">
                                <button type="button" class="captcha-btn" id="captchaBtn" onclick="sendCaptcha()">获取验证码</button>
                            </div>
                        </div>
                        <span class="error-message" id="smsCodeError">
                            <span>⚠️</span> 请输入6位验证码
                        </span>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="smsRememberMe">
                            <span>记住我</span>
                        </label>
                    </div>

                    <button type="submit" class="submit-btn" id="smsSubmitBtn">
                        <span>登录</span>
                    </button>
                </form>

                <!-- Social Login -->
                <div class="social-login">
                    <div class="social-login-divider">
                        <span>其他登录方式</span>
                    </div>
                    <div class="social-login-buttons">
                        <button class="social-btn wechat" onclick="socialLogin('wechat')" title="微信登录">
                            💬
                        </button>
                        <button class="social-btn alipay" onclick="socialLogin('alipay')" title="支付宝登录">
                            🔵
                        </button>
                    </div>
                </div>

                <!-- Agreement -->
                <p class="login-agreement">
                    登录即表示您同意我们的<br>
                    <a href="#">用户协议</a> 和 <a href="#">隐私政策</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message" id="toastMessage">操作成功</span>
    </div>

    <script>
        // Modal Functions
        function openLoginModal() {
            document.getElementById('loginModalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            // Focus on first input
            setTimeout(() => {
                const activeForm = document.querySelector('.login-form.active');
                if (activeForm) {
                    const firstInput = activeForm.querySelector('.form-input');
                    if (firstInput) firstInput.focus();
                }
            }, 300);
        }

        function closeLoginModal() {
            document.getElementById('loginModalOverlay').classList.remove('active');
            document.body.style.overflow = '';
            // Reset forms
            setTimeout(() => {
                document.getElementById('passwordForm').reset();
                document.getElementById('smsForm').reset();
                clearErrors();
            }, 300);
        }

        function closeLoginModalOnOverlay(event) {
            if (event.target === event.currentTarget) {
                closeLoginModal();
            }
        }

        // Tab Switching
        function switchTab(tab) {
            // Update tab buttons
            document.querySelectorAll('.login-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            // Update forms
            document.querySelectorAll('.login-form').forEach(form => {
                form.classList.remove('active');
            });
            document.getElementById(`${tab}Form`).classList.add('active');

            // Focus on first input of new form
            setTimeout(() => {
                const firstInput = document.getElementById(`${tab}Form`).querySelector('.form-input');
                if (firstInput) firstInput.focus();
            }, 100);
        }

        // Password Toggle
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // Form Validation
        function validatePhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showError(inputId, errorId, show = true) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);
            if (show) {
                input.classList.add('error');
                error.classList.add('show');
            } else {
                input.classList.remove('error');
                error.classList.remove('show');
            }
        }

        function clearErrors() {
            document.querySelectorAll('.form-input').forEach(input => {
                input.classList.remove('error');
            });
            document.querySelectorAll('.error-message').forEach(error => {
                error.classList.remove('show');
            });
        }

        // Captcha
        let captchaTimer = null;
        let captchaCountdown = 60;

        function sendCaptcha() {
            const phone = document.getElementById('smsPhone').value;
            
            if (!validatePhone(phone)) {
                showError('smsPhone', 'smsPhoneError');
                showToast('请输入有效的手机号', 'error');
                return;
            }

            showError('smsPhone', 'smsPhoneError', false);
            
            const btn = document.getElementById('captchaBtn');
            btn.disabled = true;
            btn.textContent = `${captchaCountdown}s`;

            // Simulate sending captcha
            showToast('验证码已发送', 'success');

            captchaTimer = setInterval(() => {
                captchaCountdown--;
                if (captchaCountdown <= 0) {
                    clearInterval(captchaTimer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                    captchaCountdown = 60;
                } else {
                    btn.textContent = `${captchaCountdown}s`;
                }
            }, 1000);
        }

        // Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            
            const icon = type === 'success' ? '✓' : '✕';
            toast.querySelector('.toast-icon').textContent = icon;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Password Login Handler
        function handlePasswordLogin(event) {
            event.preventDefault();
            clearErrors();

            const account = document.getElementById('passwordAccount').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('passwordSubmitBtn');

            // Validation
            let hasError = false;

            if (!account) {
                showError('passwordAccount', 'passwordAccountError');
                hasError = true;
            } else if (!validatePhone(account) && !validateEmail(account)) {
                showError('passwordAccount', 'passwordAccountError');
                hasError = true;
            }

            if (!password) {
                showError('password', 'passwordError');
                hasError = true;
            }

            if (hasError) return;

            // Simulate login
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            setTimeout(() => {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                
                // Simulate success
                showToast('登录成功！', 'success');
                
                setTimeout(() => {
                    closeLoginModal();
                    // Redirect based on role (simulated)
                    // window.location.href = '/dashboard';
                }, 1000);
            }, 1500);
        }

        // SMS Login Handler
        function handleSMSLogin(event) {
            event.preventDefault();
            clearErrors();

            const phone = document.getElementById('smsPhone').value.trim();
            const code = document.getElementById('smsCode').value.trim();
            const submitBtn = document.getElementById('smsSubmitBtn');

            // Validation
            let hasError = false;

            if (!validatePhone(phone)) {
                showError('smsPhone', 'smsPhoneError');
                hasError = true;
            }

            if (!code || code.length !== 6) {
                showError('smsCode', 'smsCodeError');
                hasError = true;
            }

            if (hasError) return;

            // Simulate login
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            setTimeout(() => {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                
                // Simulate success
                showToast('登录成功！', 'success');
                
                setTimeout(() => {
                    closeLoginModal();
                    // Redirect based on role (simulated)
                    // window.location.href = '/dashboard';
                }, 1000);
            }, 1500);
        }

        // Social Login
        function socialLogin(provider) {
            const providerNames = {
                'wechat': '微信',
                'alipay': '支付宝'
            };
            
            showToast(`正在唤起${providerNames[provider]}登录...`, 'success');
            
            // Simulate OAuth redirect
            setTimeout(() => {
                // In real implementation, redirect to OAuth provider
                // window.location.href = `/oauth/${provider}`;
            }, 1000);
        }

        // Register & Forgot Password
        function showRegister() {
            showToast('注册功能开发中...', 'success');
            // window.location.href = '/register';
        }

        function showForgotPassword() {
            showToast('密码重置功能开发中...', 'success');
            // window.location.href = '/forgot-password';
        }

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLoginModal();
            }
        });

        // Auto-open modal on page load for demo
        window.addEventListener('load', () => {
            // Uncomment to auto-open on load
            // openLoginModal();
        });

        // Input formatting
        document.getElementById('smsPhone').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
            if (this.value.length > 11) {
                this.value = this.value.slice(0, 11);
            }
        });

        document.getElementById('smsCode').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
            if (this.value.length > 6) {
                this.value = this.value.slice(0, 6);
            }
        });

        // Real-time validation
        document.getElementById('passwordAccount').addEventListener('blur', function() {
            if (this.value && !validatePhone(this.value) && !validateEmail(this.value)) {
                showError('passwordAccount', 'passwordAccountError');
            } else {
                showError('passwordAccount', 'passwordAccountError', false);
            }
        });

        document.getElementById('smsPhone').addEventListener('blur', function() {
            if (this.value && !validatePhone(this.value)) {
                showError('smsPhone', 'smsPhoneError');
            } else {
                showError('smsPhone', 'smsPhoneError', false);
            }
        });
    </script>
</body>
</html>
