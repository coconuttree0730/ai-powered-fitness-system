<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能健身房 - 开启您的智能健身之旅</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* 会员端主题色 */
      --primary: #FF6B35;
      --primary-light: #FF8C61;
      --primary-dark: #E55A2B;
      --secondary: #2EC4B6;
      --accent: #FFD93D;
      
      /* 深色背景 */
      --bg-dark: #1A1A2E;
      --bg-dark-secondary: #16213E;
      --bg-dark-tertiary: #0F3460;
      
      /* 浅色背景 */
      --bg-light: #FAFBFC;
      --bg-white: #FFFFFF;
      
      /* 文字颜色 */
      --text-dark: #1A1A2E;
      --text-gray: #6B7280;
      --text-light: #9CA3AF;
      --text-white: #FFFFFF;
      
      /* 渐变 */
      --gradient-primary: linear-gradient(135deg, #FF6B35 0%, #FF8C61 100%);
      --gradient-dark: linear-gradient(180deg, #1A1A2E 0%, #16213E 100%);
      --gradient-hero: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
      
      /* 阴影 */
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.15);
      --shadow-primary: 0 8px 30px rgba(255, 107, 53, 0.3);
    }

    body {
      font-family: 'Noto Sans SC', 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ==================== 导航栏 ==================== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 16px 0;
      transition: all 0.3s ease;
    }

    .navbar.scrolled {
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-md);
    }

    .navbar-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: var(--gradient-primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: var(--shadow-primary);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-white);
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--gradient-primary);
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-outline {
      color: var(--text-white);
      border: 2px solid rgba(255, 255, 255, 0.3);
      background: transparent;
    }

    .btn-outline:hover {
      border-color: var(--primary);
      background: rgba(255, 107, 53, 0.1);
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: var(--text-white);
      box-shadow: var(--shadow-primary);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(255, 107, 53, 0.4);
    }

    .btn-large {
      padding: 16px 36px;
      font-size: 16px;
      border-radius: 12px;
    }

    /* ==================== Hero区域 ==================== */
    .hero {
      min-height: 100vh;
      background: var(--gradient-hero);
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding-top: 80px;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(255, 107, 53, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(46, 196, 182, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 217, 61, 0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-grid {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-content {
      animation: fadeInUp 1s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 107, 53, 0.15);
      border: 1px solid rgba(255, 107, 53, 0.3);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 14px;
      color: var(--primary-light);
      margin-bottom: 24px;
    }

    .hero-badge span {
      font-size: 16px;
    }

    .hero-title {
      font-size: 64px;
      font-weight: 800;
      color: var(--text-white);
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    .hero-title .highlight {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 20px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 40px;
      max-width: 500px;
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      gap: 20px;
      margin-bottom: 48px;
    }

    .hero-stats {
      display: flex;
      gap: 48px;
    }

    .stat-item {
      text-align: left;
    }

    .stat-number {
      font-size: 36px;
      font-weight: 800;
      color: var(--text-white);
      display: block;
    }

    .stat-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 4px;
    }

    .hero-visual {
      position: relative;
      animation: fadeInUp 1s ease 0.2s both;
    }

    .hero-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    .hero-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .hero-card-title {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-white);
      font-weight: 600;
    }

    .hero-card-icon {
      width: 40px;
      height: 40px;
      background: var(--gradient-primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .hero-card-badge {
      background: rgba(46, 196, 182, 0.2);
      color: var(--secondary);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .ai-plan-preview {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      padding: 20px;
    }

    .plan-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      margin-bottom: 12px;
      border-left: 3px solid var(--primary);
    }

    .plan-item:last-child {
      margin-bottom: 0;
    }

    .plan-icon {
      width: 44px;
      height: 44px;
      background: rgba(255, 107, 53, 0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .plan-content h4 {
      color: var(--text-white);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .plan-content p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }

    .floating-elements {
      position: absolute;
      top: -30px;
      right: -30px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .float-card {
      background: var(--bg-white);
      padding: 16px 20px;
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: float 3s ease-in-out infinite;
    }

    .float-card:nth-child(2) {
      animation-delay: 0.5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .float-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #FFD93D, #FFC107);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .float-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .float-sub {
      font-size: 12px;
      color: var(--text-gray);
    }

    /* ==================== 卖点区域 ==================== */
    .features-section {
      padding: 120px 0;
      background: var(--bg-light);
    }

    .section-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 80px;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 107, 53, 0.1);
      color: var(--primary);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 48px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .section-subtitle {
      font-size: 18px;
      color: var(--text-gray);
      max-width: 600px;
      margin: 0 auto;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .feature-card {
      background: var(--bg-white);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      transition: all 0.4s ease;
      border: 1px solid rgba(0, 0, 0, 0.05);
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--gradient-primary);
      transform: scaleX(0);
      transition: transform 0.4s ease;
    }

    .feature-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
    }

    .feature-card:hover::before {
      transform: scaleX(1);
    }

    .feature-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.1) 0%, rgba(255, 140, 97, 0.1) 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
      transition: all 0.4s ease;
    }

    .feature-card:hover .feature-icon {
      background: var(--gradient-primary);
      transform: scale(1.1);
    }

    .feature-card:hover .feature-icon {
      filter: brightness(0) invert(1);
    }

    .feature-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
    }

    .feature-desc {
      font-size: 15px;
      color: var(--text-gray);
      line-height: 1.7;
    }

    /* ==================== AI功能展示 ==================== */
    .ai-section {
      padding: 120px 0;
      background: var(--bg-dark);
      position: relative;
      overflow: hidden;
    }

    .ai-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 10% 50%, rgba(255, 107, 53, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 50%, rgba(46, 196, 182, 0.08) 0%, transparent 40%);
      pointer-events: none;
    }

    .ai-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .ai-content .section-tag {
      background: rgba(255, 107, 53, 0.15);
      color: var(--primary-light);
    }

    .ai-content .section-title {
      color: var(--text-white);
    }

    .ai-content .section-subtitle {
      color: rgba(255, 255, 255, 0.6);
    }

    .ai-features-list {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .ai-feature-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .ai-feature-check {
      width: 28px;
      height: 28px;
      background: var(--gradient-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      flex-shrink: 0;
    }

    .ai-feature-text h4 {
      color: var(--text-white);
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .ai-feature-text p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
    }

    .ai-visual {
      position: relative;
    }

    .ai-phone {
      background: linear-gradient(135deg, #2a2a4a 0%, #1a1a2e 100%);
      border-radius: 40px;
      padding: 20px;
      box-shadow: 
        0 50px 100px rgba(0, 0, 0, 0.5),
        inset 0 2px 4px rgba(255, 255, 255, 0.1);
      max-width: 360px;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ai-phone-screen {
      background: var(--bg-dark-secondary);
      border-radius: 28px;
      overflow: hidden;
      aspect-ratio: 9/19;
    }

    .phone-header {
      background: linear-gradient(90deg, #FF6B35, #FF8C61);
      padding: 20px;
      color: white;
    }

    .phone-header h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .phone-header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .phone-content {
      padding: 20px;
    }

    .chat-bubble {
      background: rgba(255, 255, 255, 0.05);
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 16px;
      border-left: 3px solid var(--primary);
    }

    .chat-bubble.ai {
      background: rgba(255, 107, 53, 0.1);
      border-left-color: var(--secondary);
    }

    .chat-bubble h5 {
      color: var(--text-white);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .chat-bubble p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      line-height: 1.6;
    }

    .plan-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .plan-tag {
      background: rgba(255, 107, 53, 0.15);
      color: var(--primary-light);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* ==================== 会员卡区域 ==================== */
    .membership-section {
      padding: 120px 0;
      background: var(--bg-light);
    }

    .membership-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-top: 60px;
    }

    .membership-card {
      background: var(--bg-white);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      border: 2px solid transparent;
      transition: all 0.4s ease;
      position: relative;
    }

    .membership-card.featured {
      border-color: var(--primary);
      transform: scale(1.05);
      box-shadow: var(--shadow-primary);
    }

    .membership-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
    }

    .membership-card.featured:hover {
      transform: scale(1.05) translateY(-8px);
    }

    .featured-badge {
      position: absolute;
      top: -12px;
      right: 20px;
      background: var(--gradient-primary);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      box-shadow: var(--shadow-primary);
    }

    .card-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .card-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .card-duration {
      font-size: 14px;
      color: var(--text-gray);
      margin-bottom: 20px;
    }

    .card-price {
      font-size: 42px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .card-price span {
      font-size: 16px;
      color: var(--text-gray);
      font-weight: 500;
    }

    .card-features {
      list-style: none;
      margin: 32px 0;
      text-align: left;
    }

    .card-features li {
      padding: 10px 0;
      color: var(--text-gray);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-features li::before {
      content: '✓';
      color: var(--secondary);
      font-weight: 700;
    }

    .card-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .card-btn-secondary {
      background: var(--bg-light);
      color: var(--text-dark);
    }

    .card-btn-secondary:hover {
      background: #e5e7eb;
    }

    .card-btn-primary {
      background: var(--gradient-primary);
      color: white;
      box-shadow: var(--shadow-primary);
    }

    .card-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(255, 107, 53, 0.4);
    }

    /* ==================== 数据统计区域 ==================== */
    .stats-section {
      padding: 100px 0;
      background: var(--gradient-dark);
      position: relative;
    }

    .stats-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px;
      text-align: center;
    }

    .stats-item {
      position: relative;
    }

    .stats-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 60px;
      background: rgba(255, 255, 255, 0.1);
    }

    .stats-number {
      font-size: 56px;
