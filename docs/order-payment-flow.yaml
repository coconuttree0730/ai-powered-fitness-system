meta:
  title: 商城下单与支付宝支付流程图
  description: 完整的电商订单流程，包含商品浏览、下单、支付、回调处理
  profile: engineering-review
  theme: default
  layout: top-down

diagram:
  nodes:
    # 用户端流程
    - id: start
      label: 用户进入商城
      type: start
      x: 400
      y: 40

    - id: browse
      label: 浏览商品列表
      type: process
      x: 400
      y: 100

    - id: select_product
      label: 选择商品
      type: process
      x: 400
      y: 160

    - id: check_stock
      label: 库存充足？
      type: decision
      x: 400
      y: 220

    - id: stock_insufficient
      label: 提示库存不足
      type: process
      x: 600
      y: 220

    - id: calculate_price
      label: 计算价格\n(含积分抵扣)
      type: process
      x: 400
      y: 300

    - id: confirm_order
      label: 确认订单信息
      type: process
      x: 400
      y: 360

    - id: create_order
      label: 创建订单\n(状态:PENDING)
      type: process
      x: 400
      y: 420

    - id: deduct_stock
      label: 预扣库存\n扣除积分
      type: process
      x: 400
      y: 480

    - id: select_payment
      label: 选择支付方式
      type: process
      x: 400
      y: 540

    - id: payment_method
      label: 支付方式？
      type: decision
      x: 400
      y: 600

    # 支付宝支付流程
    - id: alipay_create
      label: 调用支付宝\n创建支付订单
      type: process
      x: 250
      y: 680

    - id: alipay_qr
      label: 生成支付二维码\n或跳转支付页面
      type: process
      x: 250
      y: 740

    - id: user_scan
      label: 用户扫码/确认支付
      type: process
      x: 250
      y: 800

    - id: alipay_process
      label: 支付宝处理支付
      type: process
      x: 250
      y: 860

    - id: alipay_callback
      label: 支付宝异步回调
      type: process
      x: 250
      y: 920

    - id: verify_sign
      label: 验签成功？
      type: decision
      x: 250
      y: 980

    - id: update_order_paid
      label: 更新订单状态\n为已支付(PAID)
      type: process
      x: 250
      y: 1060

    - id: payment_success
      label: 支付成功
      type: process
      x: 250
      y: 1120

    # 其他支付方式（余额支付）
    - id: balance_pay
      label: 余额支付
      type: process
      x: 550
      y: 680

    - id: check_balance
      label: 余额充足？
      type: decision
      x: 550
      y: 740

    - id: deduct_balance
      label: 扣除余额\n更新订单状态
      type: process
      x: 550
      y: 820

    - id: balance_insufficient
      label: 提示余额不足
      type: process
      x: 750
      y: 740

    # 订单后续处理
    - id: order_processing
      label: 订单处理中
      type: process
      x: 400
      y: 1200

    - id: ship_goods
      label: 发货/提供服务
      type: process
      x: 400
      y: 1260

    - id: confirm_receive
      label: 用户确认收货
      type: process
      x: 400
      y: 1320

    - id: order_complete
      label: 订单完成
      type: end
      x: 400
      y: 1380

    # 异常处理分支
    - id: payment_timeout
      label: 支付超时？
      type: decision
      x: 50
      y: 800

    - id: cancel_order
      label: 自动取消订单\n回滚库存和积分
      type: process
      x: 50
      y: 880

    - id: manual_cancel
      label: 用户主动取消
      type: process
      x: 50
      y: 600

    - id: refund_process
      label: 退款处理
      type: process
      x: 50
      y: 1120

  edges:
    # 主流程
    - from: start
      to: browse

    - from: browse
      to: select_product

    - from: select_product
      to: check_stock

    - from: check_stock
      to: stock_insufficient
      label: 否

    - from: check_stock
      to: calculate_price
      label: 是

    - from: stock_insufficient
      to: browse

    - from: calculate_price
      to: confirm_order

    - from: confirm_order
      to: create_order

    - from: create_order
      to: deduct_stock

    - from: deduct_stock
      to: select_payment

    - from: select_payment
      to: payment_method

    # 支付宝支付分支
    - from: payment_method
      to: alipay_create
      label: 支付宝

    - from: alipay_create
      to: alipay_qr

    - from: alipay_qr
      to: user_scan

    - from: user_scan
      to: alipay_process

    - from: alipay_process
      to: alipay_callback

    - from: alipay_callback
      to: verify_sign

    - from: verify_sign
      to: update_order_paid
      label: 是

    - from: verify_sign
      to: refund_process
      label: 否

    - from: update_order_paid
      to: payment_success

    # 余额支付分支
    - from: payment_method
      to: balance_pay
      label: 余额

    - from: balance_pay
      to: check_balance

    - from: check_balance
      to: deduct_balance
      label: 是

    - from: check_balance
      to: balance_insufficient
      label: 否

    - from: balance_insufficient
      to: select_payment

    - from: deduct_balance
      to: payment_success

    # 订单后续
    - from: payment_success
      to: order_processing

    - from: order_processing
      to: ship_goods

    - from: ship_goods
      to: confirm_receive

    - from: confirm_receive
      to: order_complete

    # 异常处理
    - from: user_scan
      to: payment_timeout

    - from: payment_timeout
      to: cancel_order
      label: 是

    - from: payment_timeout
      to: alipay_process
      label: 否

    - from: manual_cancel
      to: cancel_order

    - from: cancel_order
      to: browse

    - from: refund_process
      to: cancel_order
